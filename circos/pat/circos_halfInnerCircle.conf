
#show_links      = yes
show_highlights = yes
#show_text       = yes
#show_heatmaps   = yes
#show_scatter    = yes
show_histogram  = yes

<<include karyotype.and.layout.conf>>

### PLOTS
<plots>
#~~~~~~~~~~~~~~~~~ Centromeres
<plot>
show = conf(show_highlights)
type = highlight
file = data/highlight_CEN.txt
r0   = 1r-35p
r1   = 1r+35p
stroke_color = red
stroke_thickness = 3
fill_color = red
</plot>

#~~~~~~~~~~~~~~~~~ APR
# oriented outward
<plot>
show = conf(show_histogram)
type = histogram
file = data/APR.100kb.txt
min = 0
max = 23253
fill_under = yes
# 4th color in 5-color blues sequential palette with
# transparency (_aN means N/6% transparency (5/6 = 83%).
fill_color = myviridisapr_a3 #blues-5-seq-4_a5
color = myviridisapr
r0 = 1r-110p
r1 = 1r-20p
orientation = out
<axes>
show      = data
thickness = 1
<axis>
spacing       = 0.10r
color         = vlgrey
position_skip = 0.25r,0.35r
</axis>
</axes>
</plot>

